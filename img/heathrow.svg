<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714"/>
      <stop offset="100%" style="stop-color:#c49000"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#e2b714" stroke-width="3"/>
  <!-- Hub ring -->
  <circle cx="128" cy="128" r="45" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.8"/>
  <circle cx="128" cy="128" r="8" fill="#e2b714"/>
  <!-- Spokes to source icons -->
  <!-- Top: Email -->
  <line x1="128" y1="83" x2="128" y2="48" stroke="#e2b714" stroke-width="2" opacity="0.6"/>
  <rect x="116" y="34" width="24" height="16" rx="2" fill="none" stroke="#e2b714" stroke-width="2"/>
  <polyline points="116,36 128,44 140,36" fill="none" stroke="#e2b714" stroke-width="1.5"/>
  <!-- Top-right: Chat bubble -->
  <line x1="160" y1="96" x2="190" y2="62" stroke="#39c" stroke-width="2" opacity="0.6"/>
  <rect x="180" y="46" width="26" height="18" rx="4" fill="none" stroke="#39c" stroke-width="2"/>
  <circle cx="188" cy="55" r="1.5" fill="#39c"/>
  <circle cx="193" cy="55" r="1.5" fill="#39c"/>
  <circle cx="198" cy="55" r="1.5" fill="#39c"/>
  <!-- Right: RSS -->
  <line x1="173" y1="128" x2="210" y2="128" stroke="#f80" stroke-width="2" opacity="0.6"/>
  <circle cx="224" cy="128" r="3" fill="#f80"/>
  <path d="M215,118 A16,16 0 0,1 231,134" fill="none" stroke="#f80" stroke-width="2.5"/>
  <path d="M211,112 A24,24 0 0,1 237,138" fill="none" stroke="#f80" stroke-width="2"/>
  <!-- Bottom-right: Discord/Chat -->
  <line x1="160" y1="160" x2="188" y2="192" stroke="#77d" stroke-width="2" opacity="0.6"/>
  <text x="190" y="202" font-family="sans-serif" font-size="22" font-weight="bold" fill="#77d">#</text>
  <!-- Bottom: Terminal -->
  <line x1="128" y1="173" x2="128" y2="204" stroke="#4c4" stroke-width="2" opacity="0.6"/>
  <rect x="110" y="206" width="36" height="24" rx="3" fill="none" stroke="#4c4" stroke-width="2"/>
  <text x="116" y="224" font-family="monospace" font-size="12" fill="#4c4">&gt;_</text>
  <!-- Bottom-left: Phone/SMS -->
  <line x1="96" y1="160" x2="68" y2="192" stroke="#5b5" stroke-width="2" opacity="0.6"/>
  <rect x="54" y="188" width="18" height="28" rx="3" fill="none" stroke="#5b5" stroke-width="2"/>
  <circle cx="63" cy="212" r="2" fill="#5b5"/>
  <!-- Left: Reddit/Forum -->
  <line x1="83" y1="128" x2="46" y2="128" stroke="#e55" stroke-width="2" opacity="0.6"/>
  <circle cx="34" cy="128" r="12" fill="none" stroke="#e55" stroke-width="2"/>
  <circle cx="30" cy="124" r="2" fill="#e55"/>
  <circle cx="38" cy="124" r="2" fill="#e55"/>
  <path d="M29,131 Q34,136 39,131" fill="none" stroke="#e55" stroke-width="1.5"/>
  <!-- Top-left: Web -->
  <line x1="96" y1="96" x2="68" y2="64" stroke="#a8e" stroke-width="2" opacity="0.6"/>
  <circle cx="56" cy="52" r="14" fill="none" stroke="#a8e" stroke-width="2"/>
  <ellipse cx="56" cy="52" rx="6" ry="14" fill="none" stroke="#a8e" stroke-width="1"/>
  <line x1="42" y1="52" x2="70" y2="52" stroke="#a8e" stroke-width="1"/>
  <!-- Center H -->
  <text x="118" y="136" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e2b714">H</text>
</svg>
